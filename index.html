<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noosphere City | Gazipasha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Orbitron', Arial, sans-serif;
      background: #0f0f0f;
      color: #fff;
      margin: 0;
      padding: 1rem;
      min-height: 100vh;
    }
    .container {
      max-width: 410px;
      margin: 2rem auto;
      background: #181818;
      border-radius: 12px;
      box-shadow: 0 0 32px #00ffee33;
      padding: 2rem 1.5rem 1.5rem 1.5rem;
      text-align: center;
    }
    h1 {
      margin-bottom: 0.6rem;
      font-size: 2.3rem;
    }
    .sub {
      font-size: 1.12rem;
      margin-bottom: 1.7rem;
      color: #c6fff7;
    }
    form {
      margin-top: 1rem;
      text-align: left;
    }
    form label {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.4rem;
      display: block;
      color: #00ffee;
    }
    form input, form textarea {
      width: 100%;
      padding: 0.7rem;
      margin-bottom: 1rem;
      border-radius: 7px;
      border: none;
      background: #222;
      color: #fff;
      font-size: 1rem;
      box-sizing: border-box;
      outline: none;
      transition: box-shadow 0.2s;
    }
    form input:focus, form textarea:focus {
      box-shadow: 0 0 6px #00ffee88;
    }
    form button {
      width: 100%;
      padding: 1rem;
      background: #00ffee;
      color: #181818;
      font-weight: bold;
      font-size: 1.1rem;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      box-shadow: 0 0 15px #00ffee99;
      transition: background 0.2s, color 0.2s;
    }
    form button:disabled {
      background: #5cffeeb7;
      color: #888;
      cursor: not-allowed;
    }
    .success-message {
      color: #00ffcc;
      text-align: center;
      font-weight: 600;
      margin-top: 1.1rem;
      display: none;
    }
    .timer {
      margin: 1.5rem 0 1.7rem 0;
      background: #181a1a;
      border-radius: 7px;
      padding: 0.8rem 0.5rem;
      font-size: 1.1rem;
      box-shadow: 0 0 8px #00ffee22;
    }
    /* Honeypot */
    .hidden-hp { display: none !important; }
    @media (max-width: 520px) {
      .container {
        margin: 0.7rem;
        padding: 1rem 0.3rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 data-i18n="h1"></h1>
    <div class="sub" data-i18n="sub"></div>

    <div class="timer">
      🔥 <span data-i18n="timer_text_1"></span> <b id="spots-left">13</b> <span data-i18n="timer_text_2"></span> &nbsp;|&nbsp;
      <span data-i18n="timer_text_3"></span> <span id="countdown">--:--:--</span> <span style="font-size:1.3em;vertical-align:-0.1em;color:#ff59a5;animation:beat 1s infinite;">❤️</span>
    </div>

    <form id="signalForm" autocomplete="off">
      <input type="text" name="website" class="hidden-hp" tabindex="-1" autocomplete="off">
      <label for="name" data-i18n="label_name"></label>
      <input type="text" id="name" name="name" required autocomplete="off">

      <label for="contact" data-i18n="label_contact"></label>
      <input type="text" id="contact" name="contact" required autocomplete="off">

      <label for="message" data-i18n="label_message"></label>
      <textarea id="message" name="message" rows="3" required></textarea>

      <button type="submit" id="submitBtn" data-i18n="button_submit"></button>
    </form>
    <div class="success-message" id="successMessage" data-i18n="success_message"></div>
    <div style="font-size:0.91em; color:#7ef6e3; margin-top:1.7rem; text-align:center; opacity:0.65;" data-i18n="footer_text">
    </div>
  </div>

  <script src="localization.js" defer></script>
  <script src="main.js" defer></script>
</body>
</html>
